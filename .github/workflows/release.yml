name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact_name: structoptimizer-linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            artifact_name: structoptimizer-linux-arm64
          # macOS
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact_name: structoptimizer-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact_name: structoptimizer-darwin-arm64
          # Windows
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact_name: structoptimizer-windows-amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.arch }}
        run: |
          mkdir -p dist
          OUTPUT_NAME="${{ matrix.artifact_name }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            OUTPUT_NAME="${OUTPUT_NAME}.exe"
          fi
          go build -ldflags="-s -w" -o "dist/${OUTPUT_NAME}" ./cmd/structoptimizer

      - name: Create archive
        shell: bash
        run: |
          cd dist
          if [ "${{ matrix.goos }}" = "windows" ]; then
            7z a "../${{ matrix.artifact_name }}.zip" "${{ matrix.artifact_name }}.exe"
          else
            tar czf "../${{ matrix.artifact_name }}.tar.gz" "${{ matrix.artifact_name }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}.tar.gz
            ${{ matrix.artifact_name }}.zip
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec sha256sum {} \; > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/checksums.txt
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
