name: Version Check

on:
  push:
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'reporter/reporter_i18n.go'
      - 'design.md'
      - 'README.md'
      - 'README.zh-CN.md'
      - 'docs/CONFIG.md'

jobs:
  check-version:
    name: Verify Version Consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from code
        id: code_version
        run: |
          VERSION=$(grep 'const Version' reporter/reporter_i18n.go | grep -o '[0-9]\+\.[0-9]\+\.[0-9]\+')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Code version: ${VERSION}"

      - name: Check design.md version
        run: |
          CODE_VER="${{ steps.code_version.outputs.version }}"
          DESIGN_VER=$(grep '\*\*Version:\*\*' design.md | grep -o '[0-9]\+\.[0-9]\+\.[0-9]\+')
          echo "design.md version: ${DESIGN_VER}"
          if [ "${DESIGN_VER}" != "${CODE_VER}" ]; then
            echo "ERROR: design.md version (${DESIGN_VER}) does not match code version (${CODE_VER})"
            exit 1
          fi
          echo "✅ design.md version matches"

      - name: Check README versions
        run: |
          CODE_VER="${{ steps.code_version.outputs.version }}"
          for f in README.md README.zh-CN.md; do
            README_VER=$(grep -oP 'VERSION=v\K[0-9]+\.[0-9]+\.[0-9]+' "$f" | head -1)
            echo "$f version: ${README_VER:-not found}"
            if [ -z "${README_VER}" ]; then
              echo "WARNING: No VERSION=vX.Y.Z found in $f"
              continue
            fi
            if [ "${README_VER}" != "${CODE_VER}" ]; then
              echo "ERROR: $f version (${README_VER}) does not match code version (${CODE_VER})"
              exit 1
            fi
            echo "✅ $f version matches"
          done

      - name: Check CONFIG.md version
        run: |
          CODE_VER="${{ steps.code_version.outputs.version }}"
          CONFIG_VER=$(grep -oP 'download/v\K[0-9]+\.[0-9]+\.[0-9]+' docs/CONFIG.md | head -1)
          echo "docs/CONFIG.md version: ${CONFIG_VER:-not found}"
          if [ -z "${CONFIG_VER}" ]; then
            echo "WARNING: No version found in docs/CONFIG.md"
          elif [ "${CONFIG_VER}" != "${CODE_VER}" ]; then
            echo "ERROR: docs/CONFIG.md version (${CONFIG_VER}) does not match code version (${CODE_VER})"
            exit 1
          else
            echo "✅ docs/CONFIG.md version matches"
          fi
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VER=$(echo "${{ github.ref }}" | sed 's|refs/tags/v||')
          CODE_VER="${{ steps.code_version.outputs.version }}"
          echo "Tag version: ${TAG_VER}"
          echo "Code version: ${CODE_VER}"
          if [ "${TAG_VER}" != "${CODE_VER}" ]; then
            echo "ERROR: Tag version (${TAG_VER}) does not match code version (${CODE_VER})"
            echo "Run: ./scripts/release.sh ${TAG_VER}"
            exit 1
          fi
          echo "✅ Tag version matches code version"
